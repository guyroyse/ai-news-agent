name: news-agent

services:
  redis:
    image: redis:latest
    container_name: news-agent-redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - ./redis:/data

  agent-memory-server:
    image: redislabs/agent-memory-server:latest
    container_name: news-agent-ams
    ports:
      - '${AMS_PORT:-8000}:8000'
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - AUTH_MODE=disabled
      - LOG_LEVEL=DEBUG
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis

  app:
    build: .
    container_name: news-agent-app
    ports:
      - '${API_PORT:-3000}:3000'
      - '${WEB_PORT:-8080}:80'
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - AMS_URL=http://agent-memory-server:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
      - agent-memory-server
